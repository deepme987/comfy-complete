name: Bump ComfyUI on Upstream Tag

# Triggered by a repository_dispatch from the ComfyUI core repo when it tags a
# new release (or by manual workflow_dispatch). Bumps version_lock.yaml +
# requirements.txt to the new tag, opens a draft PR for review.
#
# Cloud automatically picks up the new CC ref via notify-cloud.yml → cloud's
# comfy-complete-sync.yml.

on:
  repository_dispatch:
    types: [comfyui_tag_pushed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'ComfyUI tag to bump to (e.g. v0.21.2)'
        required: true
        type: string

concurrency:
  group: bump-comfyui-${{ github.event.client_payload.release_tag || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      UPSTREAM_REPO: Comfy-Org/ComfyUI
      NEW_TAG: ${{ github.event.client_payload.release_tag || inputs.release_tag }}

    steps:
      - name: Validate dispatch payload
        run: |
          if [ -z "${NEW_TAG:-}" ]; then
            echo "::error::release_tag is required"
            exit 1
          fi
          # Tag must be safe for use as a git ref and a branch-name fragment.
          if ! [[ "$NEW_TAG" =~ ^[A-Za-z0-9._/-]+$ ]] \
              || [[ "$NEW_TAG" == -* ]] \
              || [[ "$NEW_TAG" == */ ]] \
              || [[ "$NEW_TAG" == *..* ]]; then
            echo "::error::release_tag contains characters unsafe for a git ref: $NEW_TAG"
            exit 1
          fi
          echo "Dispatched tag: $NEW_TAG"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current pins
        id: current
        run: python3 scripts/comfyui_pins.py read >> "$GITHUB_OUTPUT"

      - name: Check if already on target tag
        id: check
        env:
          OLD_TAG: ${{ steps.current.outputs.tag }}
        run: |
          if [ "$OLD_TAG" = "$NEW_TAG" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "Already pinned to $NEW_TAG; nothing to do"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone upstream (bare)
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git clone --bare "https://github.com/${UPSTREAM_REPO}.git" /tmp/comfyui-bare
          if ! git -C /tmp/comfyui-bare rev-parse --verify "refs/tags/${NEW_TAG}^{tag}" >/dev/null 2>&1 \
              && ! git -C /tmp/comfyui-bare rev-parse --verify "refs/tags/${NEW_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag $NEW_TAG does not exist in ${UPSTREAM_REPO}"
            exit 1
          fi

      - name: Extract upstream pins at new tag
        if: steps.check.outputs.needs_update == 'true'
        id: upstream
        run: |
          if ! git -C /tmp/comfyui-bare show "${NEW_TAG}:requirements.txt" > /tmp/upstream-requirements.txt; then
            echo "::error::Failed to read requirements.txt at tag $NEW_TAG"
            exit 1
          fi
          extract() {
            local name="$1"
            local pattern="$2"
            local versions
            versions=$(grep -E "$pattern" /tmp/upstream-requirements.txt \
              | sed -E 's/^[^=]+==([^ ;#]+).*/\1/' \
              | sort -u)
            local count
            count=$(printf '%s\n' "$versions" | grep -c .)
            if [ "$count" -gt 1 ]; then
              echo "::error::Expected 1 unique $name pin at $NEW_TAG, got $count: $(echo "$versions" | tr '\n' ' ')"
              exit 1
            fi
            printf '%s' "$versions"
          }
          NEW_FRONTEND=$(extract 'frontend' '^comfyui[-_]frontend[-_]package==')
          NEW_TEMPLATES=$(extract 'templates' '^comfyui[-_]workflow[-_]templates==')
          if [ -z "$NEW_FRONTEND" ] || [ -z "$NEW_TEMPLATES" ]; then
            echo "::error::Could not extract frontend/templates versions from upstream requirements.txt at $NEW_TAG"
            exit 1
          fi
          {
            echo "frontend=$NEW_FRONTEND"
            echo "templates=$NEW_TEMPLATES"
          } >> "$GITHUB_OUTPUT"
          echo "Upstream pins at $NEW_TAG: frontend=$NEW_FRONTEND templates=$NEW_TEMPLATES"

      - name: Fetch upstream commit log
        if: steps.check.outputs.needs_update == 'true'
        id: commits
        env:
          OLD_TAG: ${{ steps.current.outputs.tag }}
        run: |
          MAX_COMMITS=200
          if ! LOG=$(git -C /tmp/comfyui-bare log --oneline -n "$MAX_COMMITS" "$OLD_TAG..$NEW_TAG" 2>&1); then
            echo "::error::git log failed for range $OLD_TAG..$NEW_TAG: $LOG"
            exit 1
          fi
          TOTAL=$(git -C /tmp/comfyui-bare rev-list --count "$OLD_TAG..$NEW_TAG")
          if [ -z "$LOG" ]; then
            LOG="(no commits in range $OLD_TAG..$NEW_TAG)"
          elif [ "$TOTAL" -gt "$MAX_COMMITS" ]; then
            LOG="${LOG}"$'\n'"... ($((TOTAL - MAX_COMMITS)) more commits truncated; see upstream compare link)"
          fi
          DELIM="EOF_$(openssl rand -hex 16)"
          {
            echo "log<<${DELIM}"
            echo "$LOG"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        if: steps.check.outputs.needs_update == 'true'
        env:
          NEW_FRONTEND: ${{ steps.upstream.outputs.frontend }}
          NEW_TEMPLATES: ${{ steps.upstream.outputs.templates }}
        run: |
          python3 scripts/comfyui_pins.py bump "$NEW_TAG" "$NEW_FRONTEND" "$NEW_TEMPLATES"
          echo "--- version_lock.yaml ---"
          cat version_lock.yaml
          echo "--- requirements.txt (pinned lines) ---"
          grep -E "^comfyui_(frontend_package|workflow_templates)==" requirements.txt

      - name: Build PR body
        if: steps.check.outputs.needs_update == 'true'
        id: pr-body
        env:
          OLD_TAG: ${{ steps.current.outputs.tag }}
          OLD_FRONTEND: ${{ steps.current.outputs.frontend }}
          OLD_TEMPLATES: ${{ steps.current.outputs.templates }}
          NEW_FRONTEND: ${{ steps.upstream.outputs.frontend }}
          NEW_TEMPLATES: ${{ steps.upstream.outputs.templates }}
          COMMIT_LOG: ${{ steps.commits.outputs.log }}
          RUN_ID: ${{ github.run_id }}
        run: |
          REQ_ROWS=""
          if [ "$OLD_FRONTEND" != "$NEW_FRONTEND" ]; then
            REQ_ROWS="${REQ_ROWS}| comfyui_frontend_package | ${OLD_FRONTEND} | ${NEW_FRONTEND} |"$'\n'
          fi
          if [ "$OLD_TEMPLATES" != "$NEW_TEMPLATES" ]; then
            REQ_ROWS="${REQ_ROWS}| comfyui_workflow_templates | ${OLD_TEMPLATES} | ${NEW_TEMPLATES} |"$'\n'
          fi
          if [ -z "$REQ_ROWS" ]; then
            REQ_SECTION="No requirements changes."
          else
            REQ_SECTION=$'| Package | Old | New |\n|---|---|---|\n'"$REQ_ROWS"
          fi

          DELIM="EOF_$(openssl rand -hex 16)"
          {
            echo "body<<${DELIM}"
            echo "## Description"
            echo ""
            echo "Update ComfyUI from ${OLD_TAG} to ${NEW_TAG}."
            echo ""
            echo "**Upstream diff**: https://github.com/${UPSTREAM_REPO}/compare/${OLD_TAG}...${NEW_TAG}"
            echo ""
            echo "### Commits between versions"
            echo '```'
            echo "$COMMIT_LOG"
            echo '```'
            echo ""
            echo "### Requirements changes"
            echo "$REQ_SECTION"
            echo ""
            echo "### Downstream consumers"
            echo "Merging this PR triggers notify-cloud.yml, which dispatches to Comfy-Org/cloud's"
            echo "comfy-complete-sync.yml. Cloud opens its own draft pin-bump PR. Cloud-side"
            echo "auto-generated files (services/ingest/data/object_info.json,"
            echo "services/dispatcher/server/services/preprocessing/data/no_gpu_nodes.json) are"
            echo "regenerated on that cloud PR by cloud's sync-objectinfo workflow."
            echo ""
            echo "### Note on release status"
            echo "Triggered by the \`${NEW_TAG}\` tag push upstream. A GitHub Release may not have been published yet."
            echo ""
            echo "---"
            echo "🤖 Automatically generated by the Bump ComfyUI on Upstream Tag workflow (Run: ${RUN_ID})"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.check.outputs.needs_update == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update ComfyUI to ${{ env.NEW_TAG }}, frontend ${{ steps.upstream.outputs.frontend }}, templates ${{ steps.upstream.outputs.templates }}"
          title: "chore: update ComfyUI to ${{ env.NEW_TAG }}"
          body: ${{ steps.pr-body.outputs.body }}
          branch: chore/update-comfyui-${{ env.NEW_TAG }}
          delete-branch: true
          # Not draft -- this is automation, ready for CI to gate.

      # Enable auto-merge so the PR self-merges once CC's own CI passes
      # (validate, yaml-lint, test-workflows, custom-node-review). Cloud picks
      # up the change via notify-cloud -> comfy-complete-sync -> auto-PR on
      # cloud; the cloud-side PR is the human-review gate before prod deploy.
      - name: Enable auto-merge on PR
        if: steps.check.outputs.needs_update == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR" --auto --squash || echo "::warning::auto-merge could not be enabled (likely repo settings); PR will need manual merge"

      - name: No update needed
        if: steps.check.outputs.needs_update == 'false'
        run: echo "✅ Already pinned to $NEW_TAG — no PR opened"
