name: Build CI Container

# Builds the comfy-complete CI container (CPU + custom nodes + Playwright).
# Push is disabled by default — enable via workflow_dispatch or by
# uncommenting the push trigger once the team decides on public/private.

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to GHCR'
        required: false
        default: false
        type: boolean
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'
        type: string
  # Uncomment to auto-build on main push:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'supported_nodes.yaml'
  #     - 'requirements.txt'
  #     - 'version_lock.yaml'
  #     - 'docker/Dockerfile.ci'
  #     - 'scripts/install_custom_nodes.py'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: comfy-org/comfy-complete-ci

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          TAG="${{ inputs.tag || 'latest' }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build (and optionally push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ci
          push: ${{ inputs.push == true }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        if: inputs.push != true
        run: |
          # Build locally if not pushing (build-push-action with push=false still builds)
          echo "Image built successfully. Testing..."

          # Load the image for local testing
          docker build -f docker/Dockerfile.ci -t comfy-complete-ci:test .

          # Verify ComfyUI starts on CPU
          docker run --rm -d --name cc-test -p 8188:8188 comfy-complete-ci:test
          echo "Waiting for ComfyUI to start..."

          # Wait up to 60s for the server
          for i in $(seq 1 30); do
            if curl -s http://localhost:8188/api/object_info > /dev/null 2>&1; then
              echo "ComfyUI is running!"
              # Count registered nodes
              NODE_COUNT=$(curl -s http://localhost:8188/api/object_info | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
              echo "Registered nodes: $NODE_COUNT"
              echo "node_count=$NODE_COUNT" >> $GITHUB_OUTPUT
              break
            fi
            echo "  waiting... ($i/30)"
            sleep 2
          done

          # Grab logs
          docker logs cc-test 2>&1 | tail -30

          # Cleanup
          docker stop cc-test || true

      - name: Summary
        run: |
          {
            echo "## CI Container Build"
            echo ""
            echo "- **Base**: \`ghcr.io/comfy-org/comfyui-ci-container:0.0.16\`"
            echo "- **Push**: ${{ inputs.push || 'false' }}"
            echo "- **Tag**: ${{ inputs.tag || 'latest' }}"
          } >> "$GITHUB_STEP_SUMMARY"
