name: Notify Cloud Repo

# When comfy-complete pushes to main, notify the cloud repo to bump its pinned
# ref in comfy_complete_version.yaml. This triggers cloud's
# comfy-complete-sync.yml workflow which opens a draft PR with the new ref.

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify cloud repo
        env:
          GH_TOKEN: ${{ secrets.CLOUD_REPO_PAT }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Comfy-Org/cloud/dispatches \
            -d "{\"event_type\":\"comfy-complete-updated\",\"client_payload\":{\"ref\":\"$COMMIT_SHA\",\"branch\":\"main\"}}"
          echo "Dispatched comfy-complete-updated event to cloud repo"
